<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASPEKT | Oferta 2027</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <link rel="stylesheet" href="styles.css">
    <script defer src="animations.js"></script>
    <style>
        .password-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .password-input {
            padding: 15px;
            font-size: 1.2rem;
            text-align: center;
            border: 1px solid var(--text);
            outline: none;
            background: transparent;
            font-family: var(--f-serif);
            color: var(--text);
            margin-bottom: 2rem;
            width: 80%;
            max-width: 300px;
        }

        .password-btn {
            padding: 15px 30px;
            font-family: var(--f-sans);
            background: var(--text);
            color: var(--bg);
            border: none;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .password-btn:hover {
            opacity: 0.8;
        }

        .password-error {
            color: var(--accent);
            margin-top: 1.5rem;
            display: none;
            font-family: var(--f-serif);
            font-size: 1.2rem;
            font-style: italic;
        }

        #main-content {
            display: none;
            background-color: var(--bg);
        }

        /* NEW PREMIUM STYLE FOR OFFER PAGE */
        .editorial-hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fff;
        }

        .editorial-hero img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            /* Fade image behind text */
            filter: grayscale(80%);
            /* Noir feel */
        }

        .editorial-hero h1 {
            position: relative;
            font-family: var(--f-serif);
            font-size: clamp(3rem, 8vw, 8rem);
            color: var(--text);
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            z-index: 2;
        }

        .editorial-hero h1 span {
            font-size: 1rem;
            display: block;
            margin-bottom: 2rem;
            letter-spacing: 0.4rem;
            font-family: var(--f-sans);
        }

        .toc-section {
            padding: 15vh 5vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .toc-section h2 {
            font-family: var(--f-sans);
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 4rem;
        }

        .toc-list {
            list-style: none;
            padding: 0;
            font-size: 1.5rem;
            font-family: var(--f-serif);
            font-style: italic;
            line-height: 2.5;
        }

        .toc-list li span {
            font-family: var(--f-sans);
            font-size: 0.8rem;
            margin-right: 1rem;
            font-style: normal;
        }

        .dark-section {
            background-color: #050505;
            color: var(--bg);
            padding: 15vh 5vw;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 5rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        @media(max-width: 900px) {
            .pricing-grid {
                grid-template-columns: 1fr;
            }
        }

        .pricing-card {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem 2rem;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .pricing-card h4 {
            font-family: var(--f-sans);
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .pricing-card ul {
            list-style: none;
            padding: 0;
            font-family: var(--f-serif);
            font-size: 1.1rem;
            line-height: 2;
            opacity: 0.8;
            flex-grow: 1;
            margin-bottom: 4rem;
        }

        .pricing-card ul strong {
            font-family: var(--f-sans);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .pricing-card .price {
            font-family: var(--f-sans);
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .pricing-card .zadatek {
            font-family: var(--f-sans);
            font-size: 0.7rem;
            opacity: 0.5;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .pricing-card .desc {
            font-family: var(--f-serif);
            font-style: italic;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .split-section {
            display: flex;
            align-items: stretch;
            min-height: 80vh;
        }

        .split-section .image-side {
            flex: 1;
            background-size: cover;
            background-position: center;
        }

        .split-section .text-side {
            flex: 1;
            padding: 10vh 8vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .reviews-section {
            padding: 15vh 5vw;
        }

        .review-block {
            max-width: 800px;
            margin: 0 auto 8rem auto;
            text-align: center;
        }

        .review-block p {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .review-block .author {
            font-family: var(--f-sans);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .djs-grid {
            column-count: 2;
            column-gap: 4rem;
            max-width: 800px;
            margin: 4rem auto;
            font-family: var(--f-sans);
            font-size: 0.9rem;
            line-height: 2.5;
            letter-spacing: 2px;
            text-align: left;
        }

        @media(max-width: 768px) {
            .split-section {
                flex-direction: column;
            }

            .split-section .image-side {
                min-height: 50vh;
            }

            .djs-grid {
                column-count: 1;
            }
        }
    </style>
</head>

<body>
    <div class="cursor" style="z-index: 100000;"></div>
    <div class="cursor-follower" style="z-index: 100000;"></div>

    <div class="password-container" id="password-screen">
        <h2
            style="font-family: var(--f-sans); font-size: 1.5rem; margin-bottom: 3rem; text-transform: uppercase; letter-spacing: 3px; color: var(--text); text-align: center;">
            OFERTA ŚLUBNA 2027</h2>
        <input type="password" id="password-input" class="password-input" placeholder="WPISZ HASŁO">
        <button onclick="checkPassword()" class="password-btn" data-hover="text">WEJDŹ</button>
        <p id="error-msg" class="password-error">Niepoprawne hasło.</p>
    </div>

        function checkPassword() {
            var pwd = document.getElementById("password-input").value;
            try {
                var salt = CryptoJS.enc.Base64.parse(encryptedData.salt);
                var iv = CryptoJS.enc.Base64.parse(encryptedData.iv);
                var key = CryptoJS.PBKDF2(pwd, salt, { keySize: 256/32, iterations: 10000, hasher: CryptoJS.algo.SHA256 });
                
                var cipherParams = CryptoJS.lib.CipherParams.create({
                    ciphertext: CryptoJS.enc.Base64.parse(encryptedData.ciphertext)
                });
                var decrypted = CryptoJS.AES.decrypt(cipherParams, key, { iv: iv });
                var html = decrypted.toString(CryptoJS.enc.Utf8);
                
                if (html.includes('id="main-content"')) {
                    document.getElementById("main-content-wrapper").innerHTML = html;
                    sessionStorage.setItem("oferta_unlocked_2027", "true");
                    sessionStorage.setItem("oferta_pwd_2027", pwd);
                    unlockContent();
                } else {
                    showError();
                }
            } catch(e) {
                showError();
            }
        }
        
        function showError() {
            document.getElementById("error-msg").style.display = "block";
            setTimeout(() => document.getElementById("error-msg").style.display = "none", 3000);
        }
        
        function unlockContent() {
            document.getElementById("password-screen").style.display = "none";
            
            if (typeof initGlobalAnimations === 'function') {
                setTimeout(initGlobalAnimations, 100);
            } else {
                if (window.ScrollTrigger) ScrollTrigger.refresh();
            }
        }

        window.addEventListener("DOMContentLoaded", function() {
            var savedPwd = sessionStorage.getItem("oferta_pwd_2027");
            if (sessionStorage.getItem("oferta_unlocked_2027") === "true" && savedPwd) {
                document.getElementById("password-input").value = savedPwd;
                checkPassword(); // auto unlock
            }
        });

        document.getElementById("password-input").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });
    </script>
    <div id="main-content-wrapper"></div>
